name: Release

on:
  push:
    branches:
      - master
    paths:
      - Cargo.toml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: Compute release version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        shell: bash
        run: |
          version="$(perl -nle 'print $1 if /^version = "([^"]+)"$/' Cargo.toml)"
          tag="v${version}"
          if git rev-parse --quiet --verify "refs/tags/${tag}" >/dev/null; then
            echo "Release tag already exists: ${tag}" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  linux:
    name: Build, test and publish Linux
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: sachahjkl
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check flake
        uses: DeterminateSystems/flake-checker-action@main

      - name: Build Nix package
        run: nix build .#default

      - name: Smoke test with Nix
        run: nix run .#check

      - name: Publish linux-x64
        run: nix develop -c env COMMIT=${{ github.sha }} RELEASE_BASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.tag }}" bash ./scripts/publish-linux-x64.sh

      - name: Package linux-x64
        run: tar -czf artifacts/jav-linux-x64.tar.gz -C artifacts/linux-x64 jav

      - name: Upload linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: jav-linux-x64
          path: |
            artifacts/jav-linux-x64.tar.gz
            artifacts/linux-x64/release.json

  windows:
    name: Build, test and publish Windows
    runs-on: windows-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

      - name: Build win-x64
        run: cargo build --release --locked --target x86_64-pc-windows-gnu

      - name: Package win-x64
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/win-x64 | Out-Null
          Copy-Item target/x86_64-pc-windows-gnu/release/jav.exe artifacts/win-x64/jav.exe -Force
          Compress-Archive -Path artifacts/win-x64/jav.exe -DestinationPath artifacts/jav-win-x64.zip -Force

      - name: Build win release manifest
        shell: bash
        run: |
          hash="$(sha256sum artifacts/jav-win-x64.zip | awk '{print $1}')"
          cat > artifacts/win-x64/release.json <<EOF
          {
            "schema": 1,
            "version": "${{ needs.version.outputs.version }}",
            "commit": "${{ github.sha }}",
            "channel": "stable",
            "assets": [
              {
                "rid": "win-x64",
                "fileName": "jav-win-x64.zip",
                "sha256": "$hash",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.tag }}/jav-win-x64.zip"
              }
            ]
          }
          EOF

      - name: Upload win artifact
        uses: actions/upload-artifact@v4
        with:
          name: jav-win-x64
          path: |
            artifacts/jav-win-x64.zip
            artifacts/win-x64/release.json

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - version
      - linux
      - windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.tag }}" -m "Release ${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"

      - name: Build release manifest
        shell: bash
        run: |
          win_sha="$(sha256sum artifacts/jav-win-x64/jav-win-x64.zip | awk '{print $1}')"
          linux_sha="$(sha256sum artifacts/jav-linux-x64/jav-linux-x64.tar.gz | awk '{print $1}')"
          cat > release.json <<EOF
          {
            "schema": 1,
            "version": "${{ needs.version.outputs.version }}",
            "commit": "${{ github.sha }}",
            "channel": "stable",
            "assets": [
              {
                "rid": "win-x64",
                "fileName": "jav-win-x64.zip",
                "sha256": "$win_sha",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.tag }}/jav-win-x64.zip"
              },
              {
                "rid": "linux-x64",
                "fileName": "jav-linux-x64.tar.gz",
                "sha256": "$linux_sha",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.tag }}/jav-linux-x64.tar.gz"
              }
            ]
          }
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: |
            artifacts/jav-win-x64/jav-win-x64.zip
            artifacts/jav-linux-x64/jav-linux-x64.tar.gz
            release.json
